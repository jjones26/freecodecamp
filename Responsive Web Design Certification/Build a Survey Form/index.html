<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 id="title">Community Feedback Survey</h1>
    <p id="description">Thank you for taking the time to help us improve the platform</p>
    
    <form id="survey-form">
      <div class="form-group">
        <label id="name-label" for="name">Name</label>
        <input 
          id="name" 
          type="text" 
          placeholder="Enter your name" 
          required 
        />
      </div>

      <div class="form-group">
        <label id="email-label" for="email">Email</label>
        <input 
          id="email" 
          type="email" 
          placeholder="Enter your email" 
          required 
        />
      </div>

      <div class="form-group">
        <label id="number-label" for="number">Age (optional)</label>
        <input 
          id="number" 
          type="number" 
          min="10" 
          max="99" 
          placeholder="Age" 
        />
      </div>

      <div class="form-group">
        <p>Which option best describes your current role?</p>
        <select id="dropdown" name="role" required>
          <option disabled selected value>Select current role</option>
          <option value="student">Student</option>
          <option value="job">Full Time Job</option>
          <option value="learner">Full Time Learner</option>
          <option value="preferNo">Prefer not to say</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <p>Would you recommend this project to a friend?</p>
        <label>
          <input name="user-recommend" value="definitely" type="radio" checked /> Definitely
        </label>
        <label>
          <input name="user-recommend" value="maybe" type="radio" /> Maybe
        </label>
        <label>
          <input name="user-recommend" value="not-sure" type="radio" /> Not sure
        </label>
      </div>

      <div class="form-group">
        <p>What would you like to see improved? (Check all that apply)</p>
        <label>
          <input name="prefer" value="front-end-projects" type="checkbox" /> Front-end Projects
        </label>
        <label>
          <input name="prefer" value="back-end-projects" type="checkbox" /> Back-end Projects
        </label>
        <label>
          <input name="prefer" value="data-visualization" type="checkbox" /> Data Visualization
        </label>
      </div>

      <div class="form-group">
        <p>Any comments or suggestions?</p>
        <textarea 
          id="comments" 
          name="comment" 
          placeholder="Enter your comment here..."
        ></textarea>
      </div>

      <button type="submit" id="submit">Submit</button>
    </form>
  </body>
</html>
